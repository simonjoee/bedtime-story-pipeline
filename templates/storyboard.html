<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事板 - 睡前故事生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500&family=Playfair+Display:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #08090d;
            --bg-surface: #12141c;
            --bg-card: rgba(22, 25, 35, 0.85);
            --border: rgba(139, 124, 246, 0.12);
            --accent-violet: #a78bfa;
            --accent-rose: #f472b6;
            --accent-emerald: #34d399;
            --accent-amber: #fbbf24;
            --accent-glow: rgba(167, 139, 250, 0.4);
            --text-primary: #f0f0f5;
            --text-secondary: #9898a8;
            --text-muted: #5c5c6d;
            --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 40px rgba(167, 139, 250, 0.15);
            --star-color: rgba(167, 139, 250, 0.6);
        }

        [data-theme="light"] {
            --bg-deep: #f0f2f8;
            --bg-surface: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.95);
            --border: rgba(124, 109, 212, 0.12);
            --accent-violet: #7c6dd4;
            --accent-rose: #e05a9e;
            --accent-emerald: #22c55e;
            --accent-amber: #d97706;
            --accent-glow: rgba(124, 109, 212, 0.25);
            --text-primary: #1a1a2e;
            --text-secondary: #5c5c7a;
            --text-muted: #9090a8;
            --shadow-soft: 0 4px 24px rgba(100, 100, 140, 0.1);
            --shadow-glow: 0 0 40px rgba(124, 109, 212, 0.08);
            --star-color: rgba(124, 109, 212, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Serif SC', 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px 16px;
            transition: background 0.4s ease, color 0.3s ease;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse 100% 60% at 50% -20%, rgba(124, 109, 212, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 80% 50% at 100% 100%, rgba(224, 90, 158, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: var(--star-color);
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .theme-toggle {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .theme-toggle:hover {
            border-color: var(--accent-violet);
            background: var(--accent-violet);
            color: white;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-icon {
            font-size: 48px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 20px var(--accent-glow));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }

        h1 {
            font-family: 'Playfair Display', 'DM Sans', serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-violet) 50%, var(--accent-rose) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            animation: fadeIn 1s ease 0.3s backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: var(--text-muted);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .segment {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px 24px 24px 32px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: relative;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            overflow: hidden;
        }

        .segment::before {
            content: '';
            position: absolute;
            left: 0;
            top: 24px;
            bottom: 24px;
            width: 4px;
            background: linear-gradient(180deg,
                var(--accent-violet) 0%,
                var(--accent-rose) 50%,
                var(--accent-amber) 100%);
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .segment::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg,
                rgba(139, 124, 246, 0.03) 0%,
                transparent 50%);
            pointer-events: none;
        }

        .segment:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: rgba(139, 124, 246, 0.3);
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.3),
                0 0 80px var(--accent-glow);
        }

        @keyframes segmentEnter {
            from {
                opacity: 0;
                transform: translateY(40px) rotateX(-10deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        .segment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }

        .segment-number {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-violet), var(--accent-rose));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .segment-number::before {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--accent-violet);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-violet);
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% {
                box-shadow: 0 0 8px var(--accent-violet);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 20px var(--accent-violet), 0 0 40px var(--accent-glow);
                transform: scale(1.2);
            }
        }

        .segment-badge {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(139, 124, 246, 0.15);
            color: var(--accent-violet);
            border: 1px solid rgba(139, 124, 246, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .field {
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .field label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .field label::before {
            content: '✦';
            font-size: 8px;
            color: var(--accent-violet);
        }

        .field textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Noto Serif SC', sans-serif;
            line-height: 1.7;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-primary);
            resize: vertical;
            transition: all 0.3s ease;
        }

        .field textarea:focus {
            outline: none;
            border-color: var(--accent-violet);
            box-shadow:
                0 0 0 4px rgba(139, 124, 246, 0.15),
                0 0 30px rgba(139, 124, 246, 0.1);
            background: rgba(139, 124, 246, 0.05);
        }

        .field textarea::placeholder {
            color: var(--text-muted);
        }

        .image-container {
            position: relative;
            margin-top: 16px;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
        }

        .segment-image {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 16px;
            display: block;
            cursor: zoom-in;
            transition: all 0.4s ease;
        }

        .segment-image:hover {
            transform: scale(1.03);
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg,
                transparent 60%,
                rgba(0, 0, 0, 0.4) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 16px;
        }

        .image-container:hover .image-overlay {
            opacity: 1;
        }

        .image-placeholder {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg,
                rgba(139, 124, 246, 0.1) 0%,
                rgba(244, 114, 182, 0.1) 50%,
                rgba(251, 191, 36, 0.1) 100%);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 16px;
            border: 2px dashed rgba(139, 124, 246, 0.2);
            animation: borderRotate 4s linear infinite;
        }

        @keyframes borderRotate {
            0% { border-color: rgba(139, 124, 246, 0.2); }
            33% { border-color: rgba(244, 114, 182, 0.2); }
            66% { border-color: rgba(251, 191, 36, 0.2); }
            100% { border-color: rgba(139, 124, 246, 0.2); }
        }

        .image-placeholder-icon {
            font-size: 32px;
            opacity: 0.6;
            animation: float 2s ease-in-out infinite;
        }

        .audio-container {
            margin-top: 16px;
            background: linear-gradient(135deg,
                rgba(251, 191, 36, 0.08) 0%,
                rgba(251, 191, 36, 0.02) 100%);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(251, 191, 36, 0.15);
            position: relative;
            overflow: hidden;
        }

        .audio-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-amber), var(--accent-rose));
            border-radius: 4px 0 0 4px;
        }

        .audio-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--accent-amber);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .audio-header-icon {
            font-size: 16px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .audio-player {
            width: 100%;
            height: 44px;
            border-radius: 10px;
        }

        .audio-player::-webkit-media-controls-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .audio-placeholder {
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .audio-placeholder-icon {
            font-size: 24px;
            opacity: 0.5;
        }

        .segment-actions {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            position: relative;
            z-index: 1;
        }

        .btn {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn:disabled::before {
            display: none;
        }

        .btn-regen-img {
            background: linear-gradient(135deg,
                rgba(52, 211, 153, 0.15) 0%,
                rgba(52, 211, 153, 0.05) 100%);
            color: var(--accent-emerald);
            border: 1px solid rgba(52, 211, 153, 0.25);
        }

        .btn-regen-img:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--accent-emerald) 0%, #10b981 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 30px rgba(52, 211, 153, 0.4);
            transform: translateY(-2px);
        }

        .btn-regen-tts {
            background: linear-gradient(135deg,
                rgba(251, 191, 36, 0.15) 0%,
                rgba(251, 191, 36, 0.05) 100%);
            color: var(--accent-amber);
            border: 1px solid rgba(251, 191, 36, 0.25);
        }

        .btn-regen-tts:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--accent-amber) 0%, #f59e0b 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 30px rgba(251, 191, 36, 0.4);
            transform: translateY(-2px);
        }

        .actions {
            display: flex;
            gap: 14px;
            margin-top: 32px;
            margin-bottom: 24px;
            position: sticky;
            bottom: 20px;
            z-index: 100;
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 16px 20px;
            border: 1px solid var(--border);
            box-shadow:
                0 -10px 40px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: actionsEnter 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.5s backwards;
        }

        @keyframes actionsEnter {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-back {
            flex: 1;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--text-muted);
            color: var(--text-primary);
        }

        .btn-primary {
            flex: 2;
            padding: 16px;
            background: linear-gradient(135deg,
                var(--accent-violet) 0%,
                var(--accent-rose) 50%,
                var(--accent-amber) 100%);
            background-size: 200% 200%;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            animation: gradientShift 4s ease infinite;
            box-shadow: 0 8px 30px rgba(139, 124, 246, 0.3);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow:
                0 12px 40px rgba(139, 124, 246, 0.5),
                0 0 60px rgba(244, 114, 182, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            animation: gradientShift 4s ease infinite;
        }

        .status {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            font-size: 15px;
        }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            color: var(--text-primary);
            padding: 16px 28px;
            border-radius: 16px;
            z-index: 10000;
            border: 1px solid var(--border);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: var(--accent-emerald);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(52, 211, 153, 0.2);
        }

        .toast.success::before {
            content: '✓';
            color: var(--accent-emerald);
            font-weight: 700;
        }

        .toast.error {
            border-color: var(--accent-rose);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(244, 114, 182, 0.2);
        }

        .toast.error::before {
            content: '!';
            color: var(--accent-rose);
            font-weight: 700;
        }

        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 92%;
            max-height: 92%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalZoomIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes modalZoomIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .image-modal .close-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .image-modal .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        @media (min-width: 768px) {
            body { padding: 40px 24px; }
            .container { padding: 0; }
            .segment { padding: 28px 28px 28px 36px; }
            .header-icon { font-size: 56px; }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="starfield" id="starfield"></div>

    <div class="container">
        <div class="header-row">
            <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
        </div>

        <header>
            <div class="header-icon">🌙</div>
            <h1>故事板</h1>
            <p class="subtitle">编辑你的睡前故事</p>
        </header>

        <div id="app">
            <div class="loading">正在加载故事板...</div>
        </div>
    </div>

    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <button class="close-btn" onclick="closeImageModal()">×</button>
        <img id="modalImage" src="" alt="大图预览">
    </div>

    <script>
        const taskId = '{{ task_id }}';
        const basePath = '{{ base_path }}';

        function createStarfield() {
            const container = document.getElementById('starfield');
            if (!container) return;

            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(star);
            }
        }

        function initTheme() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }

        document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
        initTheme();
        createStarfield();

        let pollingInterval = null;
        let lastImagePaths = {};
        let lastAudioPaths = {};

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        function openImageModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        async function loadStoryboard() {
            const res = await fetch(`${basePath}/api/storyboard/${taskId}`);
            const data = await res.json();

            if (data.error) {
                document.getElementById('app').innerHTML = `<div class="status">错误: ${data.error.message}</div>`;
                stopPolling();
                return;
            }

            renderStoryboard(data, true);

            if (data.status === 'processing') {
                startPolling();
            } else {
                stopPolling();
            }
        }

        function startPolling() {
            if (!pollingInterval) {
                pollingInterval = setInterval(loadStoryboard, 3000);
            }
        }

        function stopPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }

        function renderStoryboard(data, isUpdate = false) {
            const app = document.getElementById('app');

            if (!data.segments || data.segments.length === 0) {
                app.innerHTML = '<div class="status">暂无故事板数据</div>';
                return;
            }

            const romanNumerals = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X'];

            let html = '';
            data.segments.forEach((seg, idx) => {
                const hasNewImage = lastImagePaths[idx] !== seg.image_path;
                const hasNewAudio = lastAudioPaths[idx] !== seg.audio_path;

                if (hasNewImage) lastImagePaths[idx] = seg.image_path;
                if (hasNewAudio) lastAudioPaths[idx] = seg.audio_path;

                const delay = idx * 0.12;

                html += `
                    <div class="segment" style="animation: segmentEnter 0.7s cubic-bezier(0.22, 1, 0.36, 1) backwards; animation-delay: ${delay}s;">
                        <div class="segment-header">
                            <span class="segment-number">片段 ${romanNumerals[idx] || (idx + 1)}</span>
                            <span class="segment-badge">${seg.image_path ? '图文' : '待生成'}</span>
                        </div>
                        <div class="field">
                            <label>故事文本</label>
                            <textarea id="text-${idx}" rows="3" placeholder="在此编辑故事内容...">${seg.text || ''}</textarea>
                        </div>
                        <div class="field">
                            <label>图片 Prompt</label>
                            <textarea id="prompt-${idx}" rows="2" placeholder="描述画面内容...">${seg.image_prompt || ''}</textarea>
                        </div>
                        ${seg.image_path
                            ? `<div class="image-container">
                                <img src="${basePath}/${seg.image_path}?t=${Date.now()}" class="segment-image" alt="生成图片" onclick="openImageModal('${basePath}/${seg.image_path}?t=${Date.now()}')">
                                <div class="image-overlay"></div>
                               </div>`
                            : `<div class="image-placeholder">
                                <span class="image-placeholder-icon">🖼️</span>
                                <span>图片生成中...</span>
                               </div>`}
                        ${seg.audio_path
                            ? `<div class="audio-container">
                                <div class="audio-header">
                                    <span class="audio-header-icon">🔊</span>
                                    <span>音频预览</span>
                                </div>
                                <audio controls class="audio-player">
                                    <source src="${basePath}/${seg.audio_path}?t=${Date.now()}" type="audio/mpeg">
                                    您的浏览器不支持音频播放
                                </audio>
                               </div>`
                            : `<div class="audio-placeholder">
                                <span class="audio-placeholder-icon">🔊</span>
                                <span>音频生成中...</span>
                               </div>`}
                        <div class="segment-actions">
                            <button id="regen-img-${idx}" class="btn btn-regen-img" onclick="regenerateOneSegment(${idx})">
                                🖼️ 重新生成图片
                            </button>
                            <button id="regen-tts-${idx}" class="btn btn-regen-tts" onclick="regenerateOneTTS(${idx})">
                                🔊 重新生成音频
                            </button>
                        </div>
                    </div>
                `;
            });

            html += `
                <div class="actions">
                    <button class="btn-back" onclick="window.location.href='/'">← 返回首页</button>
                    <button class="btn-primary" id="regenAllBtn" onclick="regenerate()">🎬 重新合成视频</button>
                </div>
            `;

            app.innerHTML = html;
        }

        async function saveStoryboard() {
            const segments = [];
            const segmentCount = document.querySelectorAll('.segment').length;

            for (let i = 0; i < segmentCount; i++) {
                segments.push({
                    text: document.getElementById(`text-${i}`).value,
                    image_prompt: document.getElementById(`prompt-${i}`).value
                });
            }

            const res = await fetch(`${basePath}/api/storyboard/${taskId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({segments})
            });

            const data = await res.json();
            if (data.status === 'ok') {
                showToast('保存成功！', 'success');
            } else {
                showToast('保存失败: ' + (data.error?.message || '未知错误'), 'error');
            }
        }

        async function regenerate() {
            const btn = document.getElementById('regenAllBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';

            const res = await fetch(`${basePath}/api/regenerate/${taskId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({indices: []})
            });

            const data = await res.json();
            if (data.video_url) {
                showToast('重新生成完成！', 'success');
                setTimeout(() => window.location.href = '/', 1500);
            } else {
                showToast('重新生成失败', 'error');
            }

            btn.disabled = false;
            btn.textContent = '🎬 重新合成视频';
        }

        async function regenerateOneSegment(idx) {
            const btn = document.getElementById('regen-img-' + idx);
            if (btn) {
                btn.disabled = true;
                btn.textContent = '⏳ 生成中...';
            }

            try {
                const resp = await fetch(`${basePath}/api/regenerate/${taskId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({indices: [idx]})
                });
                const data = await resp.json();

                if (resp.ok) {
                    showToast('片段 ' + (idx + 1) + ' 图片生成完成！', 'success');
                    loadStoryboard();
                } else {
                    showToast('生成失败: ' + (data.error?.message || '未知错误'), 'error');
                }
            } catch (e) {
                showToast('网络错误: ' + e.message, 'error');
            }

            if (btn) {
                btn.disabled = false;
                btn.textContent = '🖼️ 重新生成图片';
            }
        }

        async function regenerateOneTTS(idx) {
            const btn = document.getElementById('regen-tts-' + idx);
            if (btn) {
                btn.disabled = true;
                btn.textContent = '⏳ 生成中...';
            }

            try {
                const resp = await fetch(`${basePath}/api/regenerate-tts/${taskId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({indices: [idx]})
                });
                const data = await resp.json();

                if (resp.ok) {
                    showToast('片段 ' + (idx + 1) + ' 音频生成完成！', 'success');
                    loadStoryboard();
                } else {
                    showToast('生成失败: ' + (data.error?.message || '未知错误'), 'error');
                }
            } catch (e) {
                showToast('网络错误: ' + e.message, 'error');
            }

            if (btn) {
                btn.disabled = false;
                btn.textContent = '🔊 重新生成音频';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeImageModal();
            }
        });

        loadStoryboard();
    </script>
</body>
</html>
